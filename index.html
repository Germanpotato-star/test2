<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Advanced Football Game</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#111;
    font-family:Arial,Helvetica,sans-serif;
}

canvas{
    display:block;
}

#hud{
    position:absolute;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    color:white;
    text-align:center;
    z-index:100;
}

#score{
    font-size:34px;
    font-weight:bold;
}

#timer{
    font-size:20px;
}

#staminaBox{
    width:250px;
    height:20px;
    background:#333;
    border:2px solid white;
    margin:auto;
    margin-top:8px;
}

#stamina{
    height:100%;
    width:100%;
    background:lime;
}

#controls{
    position:absolute;
    bottom:10px;
    left:10px;
    color:white;
    background:rgba(0,0,0,.5);
    padding:10px;
    border-radius:10px;
}
</style>
</head>
<body>

<div id="hud">
    <div id="score">0 - 0</div>
    <div id="timer">90</div>

    <div id="staminaBox">
        <div id="stamina"></div>
    </div>
</div>

<div id="controls">
WASD = Move<br>
SHIFT = Sprint<br>
SPACE = Shoot<br>
X = Pass
</div>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}
resize();
addEventListener("resize",resize);

const FIELD_W = 2200;
const FIELD_H = 1400;

const keys = {};

document.addEventListener("keydown",e=>{
    keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup",e=>{
    keys[e.key.toLowerCase()] = false;
});

let scoreA=0;
let scoreB=0;
let matchTime=90;

setInterval(()=>{
    if(matchTime>0) matchTime--;
    document.getElementById("timer").textContent=matchTime;
},1000);

const camera={
    x:0,
    y:0
};

class Particle{
    constructor(x,y){
        this.x=x;
        this.y=y;
        this.vx=(Math.random()-.5)*4;
        this.vy=(Math.random()-.5)*4;
        this.life=20;
    }

    update(){
        this.x+=this.vx;
        this.y+=this.vy;
        this.life--;
    }

    draw(){
        ctx.fillStyle=
        "rgba(255,255,255,"+(this.life/20)+")";
        ctx.fillRect(
            this.x-camera.x,
            this.y-camera.y,
            3,3
        );
    }
}

const particles=[];

class Player{

    constructor(x,y,color,human=false){

        this.x=x;
        this.y=y;

        this.vx=0;
        this.vy=0;

        this.radius=18;
        this.color=color;

        this.human=human;

        this.stamina=100;
    }

    update(){

        if(this.human){

            let speed=4;

            if(keys["shift"] && this.stamina>0){
                speed=7;
                this.stamina-=0.4;
            }
            else{
                this.stamina+=0.2;
            }

            this.stamina=Math.max(0,
                Math.min(100,this.stamina));

            document.getElementById("stamina")
                .style.width=this.stamina+"%";

            if(keys["w"]) this.y-=speed;
            if(keys["s"]) this.y+=speed;
            if(keys["a"]) this.x-=speed;
            if(keys["d"]) this.x+=speed;
        }
    }

    draw(){

        ctx.beginPath();
        ctx.fillStyle=this.color;
        ctx.arc(
            this.x-camera.x,
            this.y-camera.y,
            this.radius,
            0,
            Math.PI*2
        );
        ctx.fill();
    }
}

const player=new Player(
    400,
    FIELD_H/2,
    "#00bfff",
    true
);

const teammates=[];
const enemies=[];

for(let i=0;i<5;i++){

    teammates.push(
        new Player(
            500+Math.random()*300,
            250+i*180,
            "#5ac8ff"
        )
    );

    enemies.push(
        new Player(
            1400+Math.random()*300,
            250+i*180,
            "#ff5555"
        )
    );
}

const goalieA={
    x:70,
    y:FIELD_H/2
};

const goalieB={
    x:FIELD_W-70,
    y:FIELD_H/2
};

const ball={
    x:FIELD_W/2,
    y:FIELD_H/2,
    vx:0,
    vy:0
};

document.addEventListener("keydown",e=>{

    if(e.code==="Space"){
        shoot();
    }

    if(e.key==="x" || e.key==="X"){
        passBall();
    }

});

function nearestMate(){

    let best=null;
    let dist=999999;

    teammates.forEach(t=>{

        const d=Math.hypot(
            t.x-player.x,
            t.y-player.y
        );

        if(d<dist){
            dist=d;
            best=t;
        }
    });

    return best;
}

function passBall(){

    const d=Math.hypot(
        ball.x-player.x,
        ball.y-player.y
    );

    if(d>60) return;

    const mate=nearestMate();

    const dx=mate.x-ball.x;
    const dy=mate.y-ball.y;

    const len=Math.hypot(dx,dy);

    ball.vx=dx/len*10;
    ball.vy=dy/len*10;
}

function shoot(){

    const d=Math.hypot(
        ball.x-player.x,
        ball.y-player.y
    );

    if(d>60) return;

    ball.vx=16;
    ball.vy=(Math.random()-.5)*5;

    for(let i=0;i<30;i++){
        particles.push(
            new Particle(ball.x,ball.y)
        );
    }
}

function updateBall(){

    const dx=ball.x-player.x;
    const dy=ball.y-player.y;

    const dist=Math.hypot(dx,dy);

    if(dist<40){

        ball.vx+=dx*0.01;
        ball.vy+=dy*0.01;
    }

    teammates.forEach(t=>{

        const d=Math.hypot(
            ball.x-t.x,
            ball.y-t.y
        );

        if(d<35){
            ball.vx+=(ball.x-t.x)*0.03;
            ball.vy+=(ball.y-t.y)*0.03;
        }
    });

    enemies.forEach(e=>{

        const angle=Math.atan2(
            ball.y-e.y,
            ball.x-e.x
        );

        e.x+=Math.cos(angle)*1.3;
        e.y+=Math.sin(angle)*1.3;

        const d=Math.hypot(
            ball.x-e.x,
            ball.y-e.y
        );

        if(d<35){
            ball.vx+=(ball.x-e.x)*0.08;
            ball.vy+=(ball.y-e.y)*0.08;
        }
    });

    goalieB.y +=
        (ball.y-goalieB.y)*0.03;

    if(
        ball.x>FIELD_W-100 &&
        Math.abs(ball.y-goalieB.y)<60
    ){
        ball.vx*=-1;
    }

    ball.x+=ball.vx;
    ball.y+=ball.vy;

    ball.vx*=0.985;
    ball.vy*=0.985;

    if(ball.y<40 || ball.y>FIELD_H-40){
        ball.vy*=-1;
    }

    checkGoal();
}

function checkGoal(){

    if(
        ball.x>FIELD_W-20 &&
        ball.y>FIELD_H/2-120 &&
        ball.y<FIELD_H/2+120
    ){
        scoreA++;
        resetKickoff();
    }

    if(
        ball.x<20 &&
        ball.y>FIELD_H/2-120 &&
        ball.y<FIELD_H/2+120
    ){
        scoreB++;
        resetKickoff();
    }

    document.getElementById("score")
        .textContent=
        scoreA+" - "+scoreB;
}

function resetKickoff(){

    ball.x=FIELD_W/2;
    ball.y=FIELD_H/2;
    ball.vx=0;
    ball.vy=0;
}

function drawField(){

    ctx.fillStyle="#198c3c";
    ctx.fillRect(
        -camera.x,
        -camera.y,
        FIELD_W,
        FIELD_H
    );

    ctx.strokeStyle="white";
    ctx.lineWidth=6;

    ctx.strokeRect(
        -camera.x,
        -camera.y,
        FIELD_W,
        FIELD_H
    );

    ctx.beginPath();
    ctx.moveTo(
        FIELD_W/2-camera.x,
        -camera.y
    );
    ctx.lineTo(
        FIELD_W/2-camera.x,
        FIELD_H-camera.y
    );
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(
        FIELD_W/2-camera.x,
        FIELD_H/2-camera.y,
        120,
        0,
        Math.PI*2
    );
    ctx.stroke();

    ctx.strokeRect(
        FIELD_W-20-camera.x,
        FIELD_H/2-120-camera.y,
        20,
        240
    );

    ctx.strokeRect(
        -camera.x,
        FIELD_H/2-120-camera.y,
        20,
        240
    );
}

function drawBall(){

    ctx.fillStyle="white";

    ctx.beginPath();
    ctx.arc(
        ball.x-camera.x,
        ball.y-camera.y,
        12,
        0,
        Math.PI*2
    );
    ctx.fill();
}

function drawMinimap(){

    const w=220;
    const h=140;

    const x=canvas.width-w-20;
    const y=20;

    ctx.fillStyle="rgba(0,0,0,.5)";
    ctx.fillRect(x,y,w,h);

    ctx.strokeStyle="white";
    ctx.strokeRect(x,y,w,h);

    ctx.fillStyle="white";

    ctx.beginPath();
    ctx.arc(
        x+(ball.x/FIELD_W)*w,
        y+(ball.y/FIELD_H)*h,
        4,
        0,
        Math.PI*2
    );
    ctx.fill();

    ctx.fillStyle="cyan";

    ctx.beginPath();
    ctx.arc(
        x+(player.x/FIELD_W)*w,
        y+(player.y/FIELD_H)*h,
        5,
        0,
        Math.PI*2
    );
    ctx.fill();
}

function update(){

    player.update();

    teammates.forEach(t=>{

        t.x +=
        (ball.x-200-t.x)*0.002;

        t.y +=
        (ball.y-t.y)*0.002;
    });

    updateBall();

    particles.forEach(p=>p.update());

    for(let i=particles.length-1;i>=0;i--){
        if(particles[i].life<=0){
            particles.splice(i,1);
        }
    }

    camera.x=
        player.x-canvas.width/2;

    camera.y=
        player.y-canvas.height/2;

    camera.x=Math.max(
        0,
        Math.min(
            FIELD_W-canvas.width,
            camera.x
        )
    );

    camera.y=Math.max(
        0,
        Math.min(
            FIELD_H-canvas.height,
            camera.y
        )
    );
}

function render(){

    drawField();

    teammates.forEach(t=>t.draw());
    enemies.forEach(e=>e.draw());

    player.draw();

    ctx.fillStyle="orange";
    ctx.fillRect(
        goalieB.x-10-camera.x,
        goalieB.y-50-camera.y,
        20,
        100
    );

    drawBall();

    particles.forEach(p=>p.draw());

    drawMinimap();
}

function loop(){

    update();

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    render();

    requestAnimationFrame(loop);
}

loop();

</script>
</body>
</html>
